name: Sync upstream

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/ConfigServerApps/service-blocklists.git
          git fetch upstream
          git checkout main
          cp .github/workflows/main.yml /tmp/main.yml
          cp README.md /tmp/README.md
          git reset --hard upstream/main
          mkdir -p .github/workflows
          cp /tmp/main.yml .github/workflows/main.yml
          cp /tmp/README.md README.md
          git add .github/workflows/main.yml README.md
          git commit -m "Restore sync workflow and README" --allow-empty
          git push origin main --force
